- generic [ref=e2]: "/* ===================================================================== styles.css — Bill Retrieval Chatbot Clean, minimal, responsive styles for search and chat pages. ===================================================================== */ /* ----- Reset & base ----- */ *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.5; color: #1a1a2e; background: #f4f6fb; min-height: 100vh; display: flex; flex-direction: column; } a { color: #2563eb; text-decoration: none; } a:hover { text-decoration: underline; } /* ----- Layout container ----- */ .container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; } /* ----- Page header ----- */ .page-header { background: #1a1a2e; color: #fff; padding: 1rem 0; margin-bottom: 0; } .page-header .container { display: flex; align-items: center; gap: 1rem; } .page-header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.01em; } .header-logo-link { display: flex; align-items: center; flex-shrink: 0; } .header-logo { width: 36px; height: 36px; display: block; } .page-header a.home-link { color: #93c5fd; font-size: 0.9rem; } /* ----- Search hero ----- */ .search-hero { background: #1a1a2e; padding: 2.5rem 1.5rem 3rem; text-align: center; margin-bottom: 2rem; } .search-tagline { color: #93c5fd; font-size: 0.95rem; margin-bottom: 1.25rem; letter-spacing: 0.01em; } .search-form { display: flex; gap: 0.6rem; max-width: 700px; margin: 0 auto; } .search-form input[type=\"text\"] { flex: 1; padding: 1rem 1.25rem; font-size: 1.1rem; font-family: inherit; border: 2px solid #334155; border-radius: 10px; outline: none; background: #fff; transition: border-color 0.15s, box-shadow 0.15s; min-width: 0; } .search-form input[type=\"text\"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25); } .search-form button { padding: 1rem 1.75rem; font-size: 1.05rem; white-space: nowrap; border-radius: 10px; } /* ----- Buttons ----- */ button, .btn { padding: 0.6rem 1.2rem; font-size: 1rem; font-weight: 500; border: none; border-radius: 6px; cursor: pointer; transition: background-color 0.15s, opacity 0.15s; background: #2563eb; color: #fff; white-space: nowrap; } button:hover:not(:disabled), .btn:hover { background: #1d4ed8; } button:disabled { opacity: 0.55; cursor: not-allowed; } /* ----- Loading indicator ----- */ .loading { display: none; } .loading:not([hidden]) { display: flex; align-items: center; gap: 0.6rem; color: #6b7280; font-size: 0.95rem; margin: 1rem 0; } .loading::before { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid #d1d5db; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; } @keyframes spin { to { transform: rotate(360deg); } } /* ----- Error message ----- */ .error { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; border-radius: 6px; padding: 0.75rem 1rem; margin: 1rem 0; font-size: 0.95rem; } /* ----- Search result cards ----- */ #results { display: flex; flex-direction: column; gap: 1rem; } .result-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem 1.25rem; transition: border-color 0.15s, box-shadow 0.15s; } .result-card:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.1); } .result-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.35rem; } .result-title a { color: #1e40af; } .result-title a:hover { color: #2563eb; } .result-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0.6rem; font-size: 0.85rem; color: #6b7280; margin-bottom: 0.5rem; } .result-chamber { background: #eff6ff; color: #1e40af; border-radius: 4px; padding: 0.1rem 0.5rem; font-weight: 500; } .result-date::before { content: 'Introduced: '; font-weight: 500; } .result-external { color: #6b7280; font-size: 0.8rem; } .result-external:hover { color: #2563eb; } .result-summary { font-size: 0.92rem; color: #374151; line-height: 1.55; } .no-results { color: #6b7280; font-style: italic; margin-top: 1rem; } /* ----- API key bar ----- */ .api-key-bar { display: flex; align-items: center; gap: 0.5rem; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.55rem 0.9rem; margin-bottom: 1rem; font-size: 0.85rem; } .api-key-label { font-weight: 500; color: #374151; white-space: nowrap; flex-shrink: 0; } .api-key-input { flex: 1; padding: 0.35rem 0.6rem; border: 1px solid #d1d5db; border-radius: 5px; font-size: 0.85rem; font-family: monospace; color: #111827; min-width: 0; } .api-key-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); } .api-key-save { padding: 0.35rem 0.75rem; border: none; border-radius: 5px; font-size: 0.82rem; cursor: pointer; background: #2563eb; color: #fff; white-space: nowrap; flex-shrink: 0; } .api-key-save:hover { background: #1d4ed8; } .api-key-clear { padding: 0.35rem 0.65rem; border: none; border-radius: 5px; font-size: 0.82rem; cursor: pointer; flex-shrink: 0; } .api-key-status { font-size: 0.82rem; white-space: nowrap; flex-shrink: 0; } .api-key-status.api-key-set { color: #059669; } .btn-danger { background: #dc2626 !important; color: #fff !important; } .btn-danger:hover { background: #b91c1c !important; } /* ----- Chat page — bill title bar ----- */ .bill-info { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.85rem 1.25rem; margin-bottom: 1.25rem; } .bill-info h2 { font-size: 1.05rem; font-weight: 600; color: #1e40af; } .bill-detail-link { display: inline-block; margin-top: 0.4rem; font-size: 0.85rem; color: #2563eb; text-decoration: none; } .bill-detail-link:hover { text-decoration: underline; } /* ----- Bill detail page ----- */ .bill-detail-header { margin-bottom: 1.5rem; } .bill-detail-header h2 { font-size: 1.3rem; font-weight: 700; color: #111827; margin-bottom: 0.6rem; } .bill-detail-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; } .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.78rem; font-weight: 600; background: #dbeafe; color: #1e40af; } .badge-secondary { background: #f3f4f6; color: #374151; } .external-link { font-size: 0.85rem; color: #2563eb; text-decoration: none; } .external-link:hover { text-decoration: underline; } .bill-section { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; } .bill-section h3 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 0.6rem; } .bill-section p { color: #374151; line-height: 1.6; } .context-note { font-size: 0.78rem; font-weight: 400; color: #9ca3af; text-transform: none; letter-spacing: 0; } .bill-context-text { white-space: pre-wrap; font-family: 'Georgia', 'Times New Roman', serif; font-size: 0.88rem; line-height: 1.6; max-height: 500px; overflow-y: auto; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 1rem 1.25rem; color: #374151; margin: 0; } .no-context { color: #9ca3af; font-style: italic; } .people-list { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; } .people-list li { color: #374151; font-size: 0.95rem; } .person-meta { color: #6b7280; font-size: 0.85rem; } .count-badge { font-size: 0.75rem; background: #e5e7eb; color: #374151; padding: 0.1rem 0.45rem; border-radius: 999px; font-weight: 500; vertical-align: middle; } .subject-tags { list-style: none; display: flex; flex-wrap: wrap; gap: 0.4rem; } .subject-tags li { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.82rem; } /* ----- Similar bills list (bill detail page) ----- */ .similar-bills-list { display: flex; flex-direction: column; gap: 0.6rem; } .similar-bill-card { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; padding: 0.75rem 1rem; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; } .similar-bill-card:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.1); } .similar-bill-title { font-size: 0.95rem; font-weight: 600; color: #1e40af; flex: 1; } .similar-bill-meta { font-size: 0.82rem; color: #6b7280; white-space: nowrap; flex-shrink: 0; } .similar-bill-card input[type=\"checkbox\"] { flex-shrink: 0; width: 16px; height: 16px; accent-color: #2563eb; cursor: pointer; } .similar-bill-card.selected { border-color: #3b82f6; background: #eff6ff; } /* ----- Chat section ----- */ #chat-section { display: flex; flex-direction: column; gap: 0.75rem; } /* ----- Message history ----- */ #chat-history-container:has(#chat-history:empty) { display: none; } .chat-history-header { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 0.5rem; } #chat-history { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; max-height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 0.6rem; scroll-behavior: smooth; } /* ----- Individual message bubbles ----- */ .message { display: flex; max-width: 85%; } .message-user { align-self: flex-end; flex-direction: row-reverse; } .message-assistant { align-self: flex-start; } .message-content { display: inline-block; padding: 0.6rem 0.9rem; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; word-break: break-word; white-space: pre-wrap; } .message-user .message-content { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; } .message-assistant .message-content { background: #f0f4ff; color: #1a1a2e; border-bottom-left-radius: 4px; } /* ----- Chat input area ----- */ .chat-input-row { display: flex; gap: 0.5rem; } .chat-input-row textarea { flex: 1; padding: 0.6rem 0.9rem; font-size: 0.95rem; font-family: inherit; border: 1px solid #d1d5db; border-radius: 6px; resize: none; outline: none; min-height: 2.8rem; max-height: 8rem; overflow-y: auto; line-height: 1.5; transition: border-color 0.15s; } .chat-input-row textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); } /* ----- Main content flex-grow (keeps footer at bottom) ----- */ main.container { flex: 1; padding-top: 2rem; padding-bottom: 2rem; } /* ----- Footer ----- */ .page-footer { background: #1a1a2e; color: #94a3b8; font-size: 0.82rem; padding: 0.9rem 0; margin-top: auto; } .page-footer .container { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; } .page-footer a { color: #93c5fd; } .page-footer a:hover { color: #fff; text-decoration: underline; } .footer-sep { color: #475569; } /* ----- Responsive adjustments ----- */ @media (max-width: 600px) { .page-header h1 { font-size: 1.1rem; } .search-form { flex-direction: column; } .search-form button { width: 100%; } .message { max-width: 95%; } #chat-history { max-height: 55vh; } .chat-input-row { flex-direction: column; } .chat-input-row button { width: 100%; } }"
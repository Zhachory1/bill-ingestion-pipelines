<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Chat</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header class="page-header">
        <div class="container">
            <a href="/" class="header-logo-link">
                <img src="/favicon.svg" alt="LegisChat logo" class="header-logo">
            </a>
            <h1>Bill Chat</h1>
            <a href="/" class="home-link">&#8592; Back to search</a>
        </div>
    </header>

    <main class="container">
        <div id="error" class="error" hidden role="alert"></div>

        <div class="api-key-bar">
            <span id="api-key-status" class="api-key-status"></span>
            <button id="api-key-toggle" type="button" class="api-key-toggle">Set API key</button>
            <div id="api-key-form" class="api-key-form" hidden>
                <input
                    id="api-key-input"
                    type="password"
                    placeholder="sk-... or sk-ant-..."
                    aria-label="LLM API key"
                    autocomplete="off"
                    spellcheck="false"
                />
                <button id="api-key-save" type="button">Save</button>
                <button id="api-key-clear" type="button" class="btn-danger">Clear</button>
            </div>
        </div>

        <div class="bill-info">
            <h2 id="bill-title">Loading bill...</h2>
            <a id="bill-detail-link" href="#" class="bill-detail-link" hidden>View bill details &#8599;</a>
        </div>

        <section id="chat-section" hidden aria-label="Chat interface">
            <div id="chat-history-container">
                <h3 class="chat-history-header">Chat History</h3>
                <div
                    id="chat-history"
                    role="log"
                    aria-label="Conversation history"
                    aria-live="polite"
                ></div>
            </div>

            <div id="loading" class="loading" hidden aria-live="polite">Waiting for response...</div>
            <div id="chat-error" class="error" hidden role="alert"></div>

            <div class="chat-input-row">
                <textarea
                    id="chat-input"
                    rows="1"
                    placeholder="Ask a question about this bill..."
                    aria-label="Your message"
                ></textarea>
                <button id="send-btn" type="button">Send</button>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <div class="container">
            <span>Built by <a href="https://github.com/Zhachory1" target="_blank" rel="noopener noreferrer">Zhachory1</a></span>
            <span class="footer-sep">·</span>
            <a href="https://github.com/Zhachory1/bill-ingestion-pipelines" target="_blank" rel="noopener noreferrer">GitHub</a>
            <span class="footer-sep">·</span>
            <span>MIT License</span>
        </div>
    </footer>

    <script src="/app.js"></script>
</body>
</html>

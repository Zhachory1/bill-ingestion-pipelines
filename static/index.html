<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Search</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header class="page-header">
        <div class="container">
            <a href="/" class="header-logo-link">
                <img src="/favicon.svg" alt="LegisChat logo" class="header-logo">
            </a>
            <h1>US Legislative Bill Search</h1>
        </div>
    </header>

    <div class="search-hero">
        <p class="search-tagline">Search 167,000+ US legislative bills by topic, keyword, or sponsor</p>
        <form id="search-form" class="search-form" role="search" aria-label="Search bills">
            <label for="search-input" class="visually-hidden">Search query</label>
            <input
                type="text"
                id="search-input"
                name="q"
                placeholder="e.g. climate change, healthcare, defense spending..."
                autocomplete="off"
                aria-label="Search bills"
            >
            <button type="submit">Search</button>
        </form>
    </div>

    <main class="container">
        <div id="loading" class="loading" hidden aria-live="polite">Searching...</div>
        <div id="error" class="error" hidden role="alert"></div>
        <div id="results" aria-live="polite" aria-label="Search results"></div>
    </main>

    <footer class="page-footer">
        <div class="container">
            <span>Built by <a href="https://github.com/Zhachory1" target="_blank" rel="noopener noreferrer">Zhachory1</a></span>
            <span class="footer-sep">·</span>
            <a href="https://github.com/Zhachory1/bill-ingestion-pipelines" target="_blank" rel="noopener noreferrer">GitHub</a>
            <span class="footer-sep">·</span>
            <span>MIT License</span>
        </div>
    </footer>

    <script src="/app.js"></script>
</body>
</html>
